name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      skip_crates_io:
        description: "Skip crates.io publish (e.g. if already published)"
        type: boolean
        default: false
      skip_pypi:
        description: "Skip PyPI publish (e.g. if already published)"
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build all artifacts first ───────────────────────────────────────
  pypi-wheels:
    name: Build wheel – ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: ${{ !inputs.skip_pypi }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up QEMU (Linux cross-compilation)
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'aarch64-unknown-linux-gnu'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path python/Cargo.toml
          manylinux: auto

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  pypi-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_pypi }}
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path python/Cargo.toml

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish to crates.io ────────────────────────────────────────────
  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_crates_io }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish copernicus_explorer
        run: |
          cargo publish -p copernicus_explorer 2>&1 || {
            if cargo publish -p copernicus_explorer 2>&1 | grep -q "already uploaded"; then
              echo "::warning::Version already exists on crates.io, skipping."
            else
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Publish to PyPI ─────────────────────────────────────────────────
  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [pypi-wheels, pypi-sdist]
    if: ${{ !inputs.skip_pypi }}
    environment:
      name: pypi
      url: https://pypi.org/p/copernicus-explorer
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
